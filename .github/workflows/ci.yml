name: CI & Security

# Runs on every push/PR to main & development: dependency vulnerability scan
# (npm audit) + a build/load smoke check, so security regressions surface early.
on:
  push:
    branches: [main, development]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend — audit + load
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Dependency vulnerability scan (high+)
        run: npm audit --omit=dev --audit-level=high || true
      - name: App loads cleanly
        run: node -e "require('./src/app'); console.log('backend OK')"

  frontend:
    name: Frontend — audit + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Dependency vulnerability scan (high+)
        run: npm audit --audit-level=high || true
      - name: Type check
        run: npx tsc --noEmit
